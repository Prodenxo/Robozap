services:
  robozap:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      COBALT_API_URL: http://cobalt:9000/
      YOUTUBE_USE_COOKIES: "false"
    depends_on:
      - cobalt
    restart: unless-stopped
    volumes:
      - ./yt-dlp-cache:/root/.cache/yt-dlp
    networks:
      - robozap-net

  cobalt:
    image: ghcr.io/imputnet/cobalt:latest
    init: true
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      API_URL: http://cobalt:9000/
      API_PORT: "9000"
      RATELIMIT_WINDOW: "60"
      RATELIMIT_MAX: "30"
      # Cookies opcionais — só monte cookies.json se quiser reforço (YOUTUBE_USE_COOKIES=true no robozap)
      # COOKIE_PATH: /cookies.json
      YOUTUBE_SESSION_SERVER: ""
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
    # volumes:
    #   - ./cookies.json:/cookies.json:ro
    networks:
      - robozap-net

  # Opcional — só se souber configurar; senão deixe parado
  yt-session:
    image: ghcr.io/imputnet/yt-session-generator:webserver
    init: true
    restart: unless-stopped
    profiles:
      - yt-session
    networks:
      - robozap-net

networks:
  robozap-net:
    driver: bridge
