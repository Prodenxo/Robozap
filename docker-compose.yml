services:
  robozap:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      COBALT_API_URL: http://cobalt:9000/
    depends_on:
      - cobalt
    restart: unless-stopped
    volumes:
      - ./yt-dlp-cache:/root/.cache/yt-dlp
    networks:
      - robozap-net

  cobalt:
    image: ghcr.io/imputnet/cobalt:latest
    init: true
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      API_URL: http://cobalt:9000/
      API_PORT: "9000"
      RATELIMIT_WINDOW: "60"
      RATELIMIT_MAX: "30"
      # Cookies YouTube (copie cookies.json para a pasta do projeto)
      COOKIE_PATH: /cookies.json
      # Renovação automática usando o yt-session (opcional, configurado via .env)
      YOUTUBE_SESSION_SERVER: "${YOUTUBE_SESSION_SERVER:-}"
      YOUTUBE_SESSION_INNERTUBE_CLIENT: "${YOUTUBE_SESSION_INNERTUBE_CLIENT:-WEB_EMBEDDED}"
      # Proxies para contornar bloqueio do YouTube
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
    volumes:
      - ./cookies.json:/cookies.json:ro
    depends_on:
      - yt-session
    networks:
      - robozap-net

  yt-session:
    image: ghcr.io/imputnet/yt-session-generator:webserver
    init: true
    restart: unless-stopped
    networks:
      - robozap-net

networks:
  robozap-net:
    driver: bridge
